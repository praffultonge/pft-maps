// ── INIT ─────────────────────────────────────────────────────────
const { Markmap, loadCSS, loadJS } = window.markmap;

const svg = document.getElementById("svg");

// Custom colours matching PFT palette — one per sector branch
const colors = [
  "#8B3216",  // Banking — burnt sienna
  "#2C5830",  // Finance — forest green
  "#1C3470",  // Capital Markets — navy
  "#6E1E3C",  // Fund Management — burgundy
  "#8C4614",  // Insurance/Bullion — amber
  "#284E5A",  // Support Services — slate teal
];

const mm = Markmap.create(svg, {
  autoFit: true,
  duration: 400,
  maxWidth: 280,
  initialExpandLevel: 2,
  color: (node) => {
    // Assign colour by top-level branch index
    const rootChildren = data.children;
    for (let i = 0; i < rootChildren.length; i++) {
      if (isDescendant(node, rootChildren[i]) || node === rootChildren[i]) {
        return colors[i];
      }
    }
    return "#CC0000"; // root node
  }
});

function isDescendant(node, ancestor) {
  if (!ancestor.children) return false;
  for (const child of ancestor.children) {
    if (child === node || isDescendant(node, child)) return true;
  }
  return false;
}

mm.setData(data);
mm.fit();

// ── CONTROLS ─────────────────────────────────────────────────────
document.getElementById("btn-fit").addEventListener("click", () => mm.fit());
document.getElementById("btn-zoomin").addEventListener("click", () => {
  mm.rescale(1.3);
});
document.getElementById("btn-zoomout").addEventListener("click", () => {
  mm.rescale(0.75);
});
